<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 LA WEB MÁS LOCA DEL MUNDO 🌟</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Comic Neue', cursive;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #f9ca24, #f0932b);
            background-size: 400% 400%;
            animation: rainbow 3s ease infinite;
            overflow-x: hidden;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><circle cx="16" cy="16" r="8" fill="%23FF6B6B" stroke="%23fff" stroke-width="2"/></svg>'), auto;
        }
        
        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        
        h1 {
            font-size: 4rem;
            color: #fff;
            text-shadow: 3px 3px 0 #000, 6px 6px 0 #ff6b6b;
            animation: bounce 2s infinite;
            margin-bottom: 20px;
        }
        
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-30px); }
            60% { transform: translateY(-15px); }
        }
        
        .meme-btn {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            border: none;
            padding: 20px 40px;
            font-size: 1.5rem;
            font-family: 'Comic Neue', cursive;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .meme-btn:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        
        .meme-btn:active {
            transform: scale(0.95);
        }
        
        .content {
            min-height: 400px;
            padding: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            margin: 20px 0;
            backdrop-filter: blur(10px);
            display: none;
        }
        
        .content.active {
            display: block;
            animation: slideIn 0.5s ease;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .chiste {
            font-size: 2rem;
            color: #fff;
            text-shadow: 2px 2px 4px #000;
            margin: 20px 0;
            line-height: 1.4;
        }
        
        .meme-img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            animation: shake 0.5s infinite;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .dance-container {
            position: relative;
            height: 200px;
            margin: 20px 0;
        }
        
        .dancing-emoji {
            font-size: 4rem;
            position: absolute;
            animation: dance 1s infinite;
        }
        
        @keyframes dance {
            0%, 100% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(10deg) scale(1.1); }
            50% { transform: rotate(-10deg) scale(1.1); }
            75% { transform: rotate(5deg) scale(1.05); }
        }
        
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        
        .particle {
            position: absolute;
            font-size: 2rem;
            animation: float 6s infinite linear;
        }
        
        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }
        
        .shake-screen {
            animation: shakeScreen 0.5s infinite;
        }
        
        @keyframes shakeScreen {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        audio {
            display: none;
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <h1>😂 ¡LA WEB MÁS LOCA! 🤪</h1>
        
        <button class="meme-btn" onclick="chisteRandom()">🎭 CHISTE RANDOM</button>
        <button class="meme-btn" onclick="memeLocura()">🦄 MEME LOCURA</button>
        <button class="meme-btn" onclick="baileLoco()">💃 BAILE LOCO</button>
        <button class="meme-btn" onclick="pantallaTemblor()">🌋 PANTALLA TREMOLOR</button>
        <button class="meme-btn" onclick="ataqueEmojis()">🎉 ATAQUE EMOJIS</button>
        
        <div id="content" class="content"></div>
    </div>
    
    <audio id="trollSound" src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAo"></audio>

    <script>
        const chistes = [
            "¡¿Por qué los pájaros no usan Facebook?! ¡Porque ya tienen Twitter! 🐦😂",
            "¿Qué le dice una iguana a otra iguana? ¡Iguana tocarte! 🦎😜",
            "¿Por qué el esqueleto no toca música? ¡Porque no tiene órganos! 💀🎸",
            "¿Qué hace una abeja en el gimnasio? ¡Zum-ba! 🐝💪",
            "¡Mi perro se comió mi tarea! El profesor dijo: '¡Tráeme el hueso entonces!' 🐶📚"
        ];

        const memes = [
            "https://media.giphy.com/media/3o7btPCcdNniyf0ArS/giphy.gif",
            "https://media.giphy.com/media/l0HlRnAWXxn0MhKLK/giphy.gif",
            "https://media.giphy.com/media/26ufnwz3wDUli7GU0/giphy.gif",
            "https://media.giphy.com/media/xT9IgzoKnwFNmISR8U/giphy.gif"
        ];

        function chisteRandom() {
            document.body.classList.remove('shake-screen');
            const content = document.getElementById('content');
            const randomChiste = chistes[Math.floor(Math.random() * chistes.length)];
            content.innerHTML = `<div class="chiste">${randomChiste}</div>`;
            content.classList.add('active');
            crearParticulas('😂', 20);
        }

        function memeLocura() {
            document.body.classList.remove('shake-screen');
            const content = document.getElementById('content');
            const randomMeme = memes[Math.floor(Math.random() * memes.length)];
            content.innerHTML = `<img src="${randomMeme}" class="meme-img" alt="Meme loco">`;
            content.classList.add('active');
            crearParticulas('🤪', 30);
        }

        function baileLoco() {
            document.body.classList.remove('shake-screen');
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="dance-container">
                    <div class="dancing-emoji" style="top: 20%; left: 20%; animation-delay: 0s;">🕺</div>
                    <div class="dancing-emoji" style="top: 30%; right: 20%; animation-delay: 0.2s;">💃</div>
                    <div class="dancing-emoji" style="top: 60%; left: 30%; animation-delay: 0.4s;">🕺</div>
                    <div class="dancing-emoji" style="bottom: 20%; right: 30%; animation-delay: 0.6s;">💃</div>
                </div>
                <h2 style="color: #fff; text-shadow: 2px 2px 4px #000; font-size: 2.5rem;">¡A BAILAR! 🎉</h2>
            `;
            content.classList.add('active');
            crearParticulas('🎉', 50);
        }

        function pantallaTemblor() {
            document.body.classList.add('shake-screen');
            const content = document.getElementById('content');
            content.innerHTML = '<h2 style="color: #fff; font-size: 3rem; text-shadow: 2px 2px 4px #000;">¡TERREMOTO DE RISA! 🌋😂</h2>';
            content.classList.add('active');
            setTimeout(() => {
                document.body.classList.remove('shake-screen');
            }, 3000);
            crearParticulas('💥', 40);
        }

        function ataqueEmojis() {
            document.body.classList.remove('shake-screen');
            const content = document.getElementById('content');
            content.innerHTML = '<h2 style="color: #fff; font-size: 2rem;">¡ATAQUE EMOJI INMINENTE! 🧨</h2>';
            content.classList.add('active');
            crearParticulas('🎊', 100);
        }

        function crearParticulas(emoji, cantidad) {
            const particles = document.getElementById('particles');
            for (let i = 0; i < cantidad; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.innerHTML = emoji;
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 3 + 3) + 's';
                particle.style.animationDelay = Math.random() * 2 + 's';
                particles.appendChild(particle);
                
                setTimeout(() => {
                    particle.remove();
                }, 8000);
            }
        }

        // Efectos continuos
        setInterval(() => {
            if (Math.random() > 0.7) {
                crearParticulas('⭐', 5);
            }
        }, 2000);

        // Sonido troll (¡opcional!)
        document.querySelectorAll('.meme-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const audio = document.getElementById('trollSound');
                audio.currentTime = 0;
                audio.play().catch(() => {}); // Ignora errores de autoplay
            });
        });
    </script>
</body>
</html>
